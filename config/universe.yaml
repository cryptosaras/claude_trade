# Universe config. THE AI MANAGES THIS FILE.
#
# Two layers:
# 1) COLLECTION (automatic): the collector discovers every live USDT contract
#    with 24h turnover >= min_turnover_usd and records its candles continuously.
#    No manual list — new listings and pumping coins appear by themselves,
#    dead ones drop out. Group symbols are always collected regardless.
# 2) TRADING GROUPS (below): the symbols strategies actively trade, organized
#    by behavior. The engine evaluates every group symbol each tick, so this
#    layer has an ENGINE capacity limit, not a market-access limit.

collect:
  min_turnover_usd: 5000000   # ~60 symbols qualify today; lower it (with reason) to widen research
  max_symbols: 900            # hard cap = essentially "everything liquid on MEXC"

groups:
  majors:
    vol_profile: low
    symbols: [BTC_USDT, ETH_USDT]
  large_alts:
    vol_profile: med
    symbols: [SOL_USDT, BNB_USDT, XRP_USDT, ADA_USDT, AVAX_USDT, LINK_USDT, HYPE_USDT, TRX_USDT]
  mid_alts:
    vol_profile: high
    symbols: [NEAR_USDT, APT_USDT, ARB_USDT, OP_USDT, SUI_USDT, SEI_USDT, TIA_USDT, INJ_USDT]
  memes:
    vol_profile: extreme
    symbols: [DOGE_USDT, SHIB_USDT, PEPE_USDT, WIF_USDT, BONK_USDT, FLOKI_USDT]

# Rules for the AI when editing this file:
# - collect.*: tune freely with a stated reason (storage grows ~10MB/symbol/month).
# - trading groups: keep the TOTAL across all groups <= ~60 symbols — the engine
#   loads 3500 x 1m candles per symbol every tick on a 2-vCPU box. Rotate members
#   in/out based on evidence; /api/universe "candidates" lists collected symbols
#   (by turnover) that are not yet in any group. You may also create new groups
#   (e.g. new_listings, ai_tokens) — strategies reference groups by name.
# - BTC_USDT stays in majors: it is the regime anchor.
